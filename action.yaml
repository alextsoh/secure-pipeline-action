name: 'Secure Image Pipeline'
description: 'SBOM generation, vulnerability scan, Cosign signing and dashboard reporting for an already-built container image.'

inputs:
  image:
    description: 'Full image reference with digest (e.g. ghcr.io/myorg/myapp@sha256:abc123)'
    required: true
  dashboard-url:
    description: 'URL of your hosted pipeline dashboard'
    required: true
  component:
    description: 'Component name for matrix builds (e.g. matrix.service). Leave empty for single-image pipelines.'
    required: false
    default: ''
  fail-on-critical:
    description: 'Fail the build if critical vulnerabilities are found (true/false)'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        image: ${{ inputs.image }}
        format: spdx-json
        output-file: sbom.spdx.json

    - name: Scan for vulnerabilities (table)
      uses: anchore/scan-action@v7
      with:
        sbom: sbom.spdx.json
        fail-build: ${{ inputs.fail-on-critical }}
        severity-cutoff: critical
        output-format: table
        output-file: vulnerability-report.txt

    - name: Scan for vulnerabilities (JSON)
      uses: anchore/scan-action@v7
      with:
        sbom: sbom.spdx.json
        fail-build: false
        severity-cutoff: critical
        output-format: json
        output-file: vulnerability-report.json

    - name: Cross-reference CISA KEV catalog
      if: always()
      shell: python3 {0}
      run: |
        import json, urllib.request, os

        try:
            url = 'https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json'
            with urllib.request.urlopen(url, timeout=15) as r:
                kev = json.load(r)
            kev_ids = {v['cveID']: v for v in kev['vulnerabilities']}
        except Exception as e:
            print(f'KEV catalog unavailable: {e}')
            json.dump([], open('kev-matches.json', 'w'))
            exit(0)

        if not os.path.exists('vulnerability-report.json'):
            json.dump([], open('kev-matches.json', 'w'))
            exit(0)

        with open('vulnerability-report.json') as f:
            grype = json.load(f)

        matches = []
        for match in grype.get('matches', []):
            vuln = match.get('vulnerability', {})
            # Grype's primary id may be a GHSA; the CVE is in relatedVulnerabilities.
            candidate_ids = [vuln.get('id', '')]
            candidate_ids += [r.get('id', '') for r in match.get('relatedVulnerabilities', [])]
            kev_id = next((i for i in candidate_ids if i in kev_ids), None)
            if kev_id:
                entry = kev_ids[kev_id]
                matches.append({
                    'cve':             kev_id,
                    'package':         match.get('artifact', {}).get('name', ''),
                    'version':         match.get('artifact', {}).get('version', ''),
                    'severity':        vuln.get('severity', ''),
                    'date_added':      entry.get('dateAdded', ''),
                    'due_date':        entry.get('dueDate', ''),
                    'required_action': entry.get('requiredAction', ''),
                    'product':         entry.get('product', ''),
                })

        with open('kev-matches.json', 'w') as f:
            json.dump(matches, f)

        print(f'KEV matches found: {len(matches)}')
        for m in matches:
            print(f"  !! {m['cve']} in {m['package']}@{m['version']} — KEV since {m['date_added']}")

    - name: Install Cosign
      uses: sigstore/cosign-installer@v3

    - name: Sign image
      id: sign
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image }}
      run: cosign sign --yes "$IMAGE_REF"

    - name: Notify dashboard
      if: always()
      shell: python3 {0}
      env:
        DASHBOARD_URL: ${{ inputs.dashboard-url }}
        IMAGE_REF: ${{ inputs.image }}
        SIGN_STATUS: ${{ steps.sign.outcome }}
        COMPONENT: ${{ inputs.component }}
        RUN_ID: ${{ github.run_id }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        REPOSITORY: ${{ github.repository }}
        COMMIT: ${{ github.sha }}
        BRANCH: ${{ github.ref_name }}
        ACTOR: ${{ github.actor }}
        EVENT_NAME: ${{ github.event_name }}
        WORKFLOW: ${{ github.workflow }}
        WORKFLOW_REF: ${{ github.workflow_ref }}
        RUNNER_OS: ${{ runner.os }}
      run: |
        import json, os, subprocess, sys

        def b64(path):
            if not os.path.exists(path):
                return ''
            r = subprocess.run(['base64', '-w0', path], capture_output=True, text=True)
            return r.stdout.strip() if r.returncode == 0 else ''

        def git(fmt):
            # works on any trigger type since the client checked out the repo before us
            r = subprocess.run(['git', 'log', '-1', f'--pretty={fmt}'], capture_output=True, text=True)
            return r.stdout.strip() if r.returncode == 0 else ''

        image_ref = os.environ['IMAGE_REF']
        digest = image_ref.split('@')[-1] if '@' in image_ref else ''
        # image identity = the name before '@', minus any mutable ':tag'
        name_part = image_ref.split('@')[0]
        image_name = name_part.rsplit(':', 1)[0] if ':' in name_part.split('/')[-1] else name_part

        payload = {
            'run_id':               os.environ['RUN_ID'],
            'component':            os.environ.get('COMPONENT', ''),
            'run_url':              os.environ['RUN_URL'],
            'repository':           os.environ['REPOSITORY'],
            'commit':               os.environ['COMMIT'],
            'commit_author':        git('%an'),
            'commit_email':         git('%ae'),
            'commit_message':       git('%s'),
            'actor':                os.environ.get('ACTOR', ''),
            'event_name':           os.environ.get('EVENT_NAME', ''),
            'workflow':             os.environ.get('WORKFLOW', ''),
            'workflow_ref':         os.environ.get('WORKFLOW_REF', ''),
            'runner_os':            os.environ.get('RUNNER_OS', ''),
            'branch':               os.environ['BRANCH'],
            'image_name':           image_name,
            'image_digest':         digest,
            'signed':               os.environ.get('SIGN_STATUS') == 'success',
            'sign_status':          os.environ.get('SIGN_STATUS', ''),
            'sbom':                 b64('sbom.spdx.json'),
            'vulnerability_report': b64('vulnerability-report.txt'),
            'vulnerability_json':   b64('vulnerability-report.json'),
            'kev_matches':          b64('kev-matches.json'),
        }

        with open('/tmp/dashboard_payload.json', 'w') as f:
            json.dump(payload, f)

        r = subprocess.run([
            'curl', '-fsSL', '-X', 'POST',
            f"{os.environ['DASHBOARD_URL'].rstrip('/')}/api/webhook",
            '-H', 'Content-Type: application/json',
            '--data', '@/tmp/dashboard_payload.json',
        ], capture_output=True, text=True)

        print(r.stdout)
        if r.returncode != 0:
            print(r.stderr, file=sys.stderr)
            sys.exit(r.returncode)
