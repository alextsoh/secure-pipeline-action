name: 'Secure Image Pipeline'
description: 'SBOM generation, vulnerability scan, Cosign signing and dashboard reporting a built container image.'

inputs:
  image:
    description: 'Full image reference with digest (e.g. ghcr.io/myorg/myapp@sha256:abc123)'
    required: true
  dashboard-url:
    description: 'URL of your hosted pipeline dashboard'
    required: true
  component:
    description: 'Component name for matrix builds (e.g. matrix.service). Leave empty for single-image pipelines.'
    required: false
    default: ''
  fail-on-critical:
    description: 'Fail the build if critical vulnerabilities are found (true/false)'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        image: ${{ inputs.image }}
        format: spdx-json
        output-file: sbom.spdx.json

    - name: Scan for vulnerabilities (table)
      uses: anchore/scan-action@v7
      with:
        sbom: sbom.spdx.json
        fail-build: ${{ inputs.fail-on-critical }}
        severity-cutoff: critical
        output-format: table
        output-file: vulnerability-report.txt

    - name: Scan for vulnerabilities (JSON)
      uses: anchore/scan-action@v7
      with:
        sbom: sbom.spdx.json
        fail-build: false
        severity-cutoff: critical
        output-format: json
        output-file: vulnerability-report.json

    - name: Install Cosign
      uses: sigstore/cosign-installer@v3

    - name: Sign image
      id: sign
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image }}
      run: cosign sign --yes "$IMAGE_REF"

    - name: Notify dashboard
      if: always()
      shell: python3 {0}
      env:
        DASHBOARD_URL: ${{ inputs.dashboard-url }}
        IMAGE_REF: ${{ inputs.image }}
        SIGN_STATUS: ${{ steps.sign.outcome }}
        COMPONENT: ${{ inputs.component }}
        RUN_ID: ${{ github.run_id }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        REPOSITORY: ${{ github.repository }}
        COMMIT: ${{ github.sha }}
        BRANCH: ${{ github.ref_name }}
      run: |
        import json, os, subprocess, sys

        def b64(path):
            if not os.path.exists(path):
                return ''
            r = subprocess.run(['base64', '-w0', path], capture_output=True, text=True)
            return r.stdout.strip() if r.returncode == 0 else ''

        image_ref = os.environ['IMAGE_REF']
        digest = image_ref.split('@')[-1] if '@' in image_ref else ''

        payload = {
            'run_id':               os.environ['RUN_ID'],
            'component':            os.environ.get('COMPONENT', ''),
            'run_url':              os.environ['RUN_URL'],
            'repository':           os.environ['REPOSITORY'],
            'commit':               os.environ['COMMIT'],
            'branch':               os.environ['BRANCH'],
            'image_digest':         digest,
            'signed':               os.environ.get('SIGN_STATUS') == 'success',
            'sign_status':          os.environ.get('SIGN_STATUS', ''),
            'sbom':                 b64('sbom.spdx.json'),
            'vulnerability_report': b64('vulnerability-report.txt'),
            'vulnerability_json':   b64('vulnerability-report.json'),
        }

        with open('/tmp/dashboard_payload.json', 'w') as f:
            json.dump(payload, f)

        r = subprocess.run([
            'curl', '-fsSL', '-X', 'POST',
            f"{os.environ['DASHBOARD_URL']}/api/webhook",
            '-H', 'Content-Type: application/json',
            '--data', '@/tmp/dashboard_payload.json',
        ], capture_output=True, text=True)

        print(r.stdout)
        if r.returncode != 0:
            print(r.stderr, file=sys.stderr)
            sys.exit(r.returncode)
